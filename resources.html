<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Study</title>
<link rel="stylesheet" href="shared.css">
<script src="theme.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
html, body {
  overflow: auto !important;
  height: auto !important;
  margin: 0;
  padding: 0;
  background: transparent !important;
}
body {
  min-height: 100vh;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: rgba(0, 0, 0, 0.15) !important;
  backdrop-filter: blur(12px) saturate(1.6) !important;
  padding: 32px;
}

.dashboard-wrap {
  max-width: 1200px;
  margin: 0 auto;
}

.search-wrapper {
  display: flex;
  align-items: center;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 40px;
  padding: 8px 20px;
  max-width: 340px;
  transition: all 0.2s ease;
  margin-bottom: 24px;
}
.search-wrapper:focus-within {
  background: rgba(255, 255, 255, 0.1);
  border-color: rgba(255, 255, 255, 0.2);
}
.search-wrapper i {
  color: rgba(255, 255, 255, 0.5);
  font-size: 16px;
  margin-right: 12px;
}
.search-wrapper input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: #fff;
  font-size: 14px;
  font-family: inherit;
  height: 32px;
}
.search-wrapper input::placeholder {
  color: rgba(255, 255, 255, 0.4);
}

.tags-container {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 32px;
}
.tag-chip {
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.04);
  border-radius: 30px;
  padding: 6px 16px;
  color: rgba(255, 255, 255, 0.8);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}
.tag-chip:hover {
  background: rgba(255, 255, 255, 0.12);
  color: #fff;
  transform: translateY(-1px);
}

.section-divider {
  width: 100%;
  height: 1px;
  background: rgba(255, 255, 255, 0.08);
  margin-bottom: 16px;
}
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}
.section-header i {
  color: #fff;
  font-size: 20px;
}
.section-header h2 {
  font-size: 22px;
  font-weight: 600;
  color: #fff;
  letter-spacing: -0.3px;
}

.game-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.game-card {
  position: relative;
  aspect-ratio: 1 / 1;
  border-radius: 16px;
  overflow: hidden;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s ease;
  min-width: 0;
}
.game-card:hover {
  transform: translateY(-4px);
  border-color: rgba(255, 255, 255, 0.15);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
}

.game-thumb {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.game-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.pin-icon {
  position: absolute;
  top: 10px;
  right: 10px;
  color: rgba(255, 255, 255, 0.6);
  font-size: 13px;
  background: rgba(0, 0, 0, 0.3);
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  backdrop-filter: blur(4px);
  pointer-events: none;
  transition: color 0.2s;
}
.game-card:hover .pin-icon {
  color: #fff;
}

#game-ctx {
  position: fixed;
  background: var(--bg2, #1e1e2f);
  border: 1px solid var(--bdr2, rgba(255, 255, 255, 0.15));
  border-radius: 10px;
  padding: 5px;
  min-width: 180px;
  z-index: 9999;
  display: none;
  box-shadow: 0 16px 48px rgba(0, 0, 0, 0.9);
}
#game-ctx .ci {
  padding: 8px 11px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  color: var(--t2, rgba(255, 255, 255, 0.7));
  display: flex;
  align-items: center;
  gap: 9px;
  transition: 0.1s;
}
#game-ctx .ci:hover {
  background: var(--surf, rgba(255, 255, 255, 0.08));
  color: var(--t1, #fff);
}

@media (max-width: 1100px) {
  .game-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 750px) {
  .game-grid { grid-template-columns: repeat(2, 1fr); }
  body { padding: 20px; }
  .search-wrapper { max-width: 100%; }
}
@media (max-width: 500px) {
  .game-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="dashboard-wrap">
  <div class="search-wrapper">
    <i class="fas fa-search"></i>
    <input type="text" id="search" placeholder="Search games..." oninput="filterGames(this.value)" autocomplete="off" />
  </div>

  <div class="tags-container">
    <div class="tag-chip">Action / Shooter</div>
    <div class="tag-chip">Arcade</div>
    <div class="tag-chip">Rhythm</div>
    <div class="tag-chip">Horror</div>
    <div class="tag-chip">Simulation</div>
    <div class="tag-chip">Strategy</div>
    <div class="tag-chip">Racing</div>
    <div class="tag-chip">Multiplayer</div>
    <div class="tag-chip">Platformer</div>
    <div class="tag-chip">Casual</div>
    <div class="tag-chip">RPG</div>
    <div class="tag-chip">Open World</div>
    <div class="tag-chip">Incremental</div>
  </div>

  <div class="section-divider"></div>
  <div class="section-header">
    <i class="fas fa-thumbtack"></i>
    <h2>Pinned Games</h2>
  </div>

  <div class="game-grid" id="game-grid"></div>
</div>

<div id="game-ctx">
  <div class="ci" id="ctx-favorite">⭐ Favorite</div>
</div>

<script>
// ─── GAME DATA ───────────────────────────────────────────────────────────────
var games = [
  {name:"Suggest a Game", img:"images/Goolge from.png", href:"https://forms.gle/dQYi7bY5XNDeQkgB9", external:true},
  {name:"Roblox", img:"images/Roblox.png", href:"https://www.roblox.com/", external:true},
  {name:"2048", img:"images/2048 image.png", href:"resources/2048/index.html"},
  {name:"Ages of Conflict", img:"images/age.jpg", href:"resources/ages-of-conflict-master/index.html"},
  {name:"BitLife", img:"images/bitlife.png", href:"resources/bitlife-unblocked-main/index.html"},
  {name:"Boxing Random", img:"images/boxing random.jpg", href:"resources/boxing-random-gh-pages/index.html"},
  {name:"Coreball", img:"images/Coreball.png", href:"resources/coreball-main/index.html"},
  {name:"Drift Hunters", img:"images/drift.jpg", href:"resources/drift-hunters/index.html"},
  {name:"Drive Mad", img:"images/drive-mad.jpg", href:"resources/drive-mad/index.html"},
  {name:"Escape Road 2", img:"images/ec.jpg", href:"resources/escaperoad2-main/index.html"},
  {name:"FNAF 2", img:"images/fnaf-2.png", href:"resources/fnaf-2-master/index.html"},
  {name:"FNAF 3", img:"images/fnaf-3.png", href:"resources/fnaf-3-master/index.html"},
  {name:"FNAF 4", img:"images/fnaf-4.png", href:"resources/fnaf-4-master/index.html"},
  {name:"1v1.lol", img:"images/1v1.lol image.jpg", href:"resources/1v1lol/index.html"},
  {name:"Cookie Clicker", img:"images/Cookie clicker.jpg", href:"resources/Cookie Clicker/index.html"},
  {name:"Fluid Simulation", img:"images/FUild.jpg", href:"resources/WebGL-Fluid-Simulation-master/index.html"},
  {name:"Slither.io", img:"images/slither.io.jpg", href:"https://slither.io/", external:true},
  {name:"Funny Shooters 2", img:"images/funny shooters.jpg", href:"resources/FunnyShooter2-main/index.html"},
  {name:"Time Shooter Swat 3", img:"images/Time shooters 3.jpg", href:"resources/time-shooter-3-swat-main/index.html"},
  {name:"Sniper shot", img:"images/sniper shot.jpg", href:"resources/sniper-shot-main/index.html"},
  {name:"Ragdoll hit", img:"images/hit man.png", href:"resources/Ragdoll-Hit-main/index.html"},
  {name:"Ragdoll Drop", img:"images/ragdoll drop.jpg", href:"resources/ragdoll-drop-main/index.html"},
  {name:"Ragdoll Archer", img:"images/Ragdoll.jpeg", href:"resources/Ragdoll-Archers-main/index.html"},
  {name:"Retro Bowl", img:"images/retro-bowl.jpg", href:"resources/retro-bowl/index.html"},
  {name:"Sausage Flipping", img:"images/sausage flipping.jpg", href:"resources/sausage-flipping-main/index.html"},
  {name:"Slope", img:"images/slope.jpg", href:"resources/slope/index.html"},
  {name:"Stickman Hook", img:"images/stick man hook.jpg", href:"resources/stickman-hook-unblocked-main/index.html"},
  {name:"Stickman Climb 2", img:"images/stickman.jpg", href:"resources/stickman-climb-2-main/index.html"},
  {name:"Space Waves 2", img:"images/SW.png", href:"resources/SpaceWavesTest2-main/index.html"},
  {name:"Snow Rider 3d", img:"images/Snow rider.jpg", href:"resources/Snow-Rider3D-main/index.html"},
  {name:"Vex6", img:"images/vex6.jpeg", href:"resources/vex6/index.html"},
  {name:"Vex7", img:"images/vex7.jpeg", href:"resources/vex7/index.html"},
  {name:"Geometry Dash lite", img:"images/geo dash lite.jpg", href:"resources/geometry-dash-lite-main/index.html"},
  {name:"Moto x3m", img:"images/moto-x3m.jpg", href:"resources/moto-x3m/index.html"},
  {name:"Moto x3m 2", img:"images/motox3m2.jpg", href:"resources/motox3m2/index.html"},
  {name:"Minecraft", img:"images/mc.png", href:"resources/Minecraft/index.html"},
  {name:"monkey mart", img:"images/mokeymart.jpg", href:"resources/monkey-mart/index.html"},
  {name:"Get yoked", img:"images/getyoked.jpg", href:"resources/get-yoked/index.html"},
  {name:"Shell Shockers", img:"images/ss.jpg", href:"https://shellshock.io/", external:true},
  {name:"Superhot", img:"images/Superhot.jpg", href:"resources/Superhot/index.html"},
  {name:"territory.io", img:"images/territory.io.jpg", href:"resources/territory.io.html"},
  {name:"Tiny Fishing", img:"images/tiny fish.jpg", href:"resources/Tiny Fishing/index.html"},
  {name:"Gorilla Tag", img:"images/GT.jpg", href:"resources/Gorilla Tag_ Webport/index.html"},
  {name:"Five Nights at Epsteins", img:"images/Five nights at E.jpg", href:"resources/Five Nights At Epsteins_ Webport/fnae.html"},
];

let currentGameForCtx = null;
let currentSearchQuery = "";

// ─── FAVORITES ──────────────────────────────────────────────────────────────
function loadFavorites() { const favs = localStorage.getItem('gameFavorites'); if (favs) return JSON.parse(favs); return []; }
function saveFavorites(favs) { localStorage.setItem('gameFavorites', JSON.stringify(favs)); }
function isFavorite(game) { return loadFavorites().some(f => f.name === game.name && f.href === game.href); }
function addToFavorites(game) { const favs = loadFavorites(); if (!isFavorite(game)) { favs.push({ name: game.name, img: game.img, href: game.href, external: game.external }); saveFavorites(favs); renderGames(getFilteredGames()); } }
function removeFromFavorites(game) { let favs = loadFavorites(); favs = favs.filter(f => !(f.name === game.name && f.href === game.href)); saveFavorites(favs); renderGames(getFilteredGames()); }
function toggleFavorite(game) { if (isFavorite(game)) removeFromFavorites(game); else addToFavorites(game); }

// ─── OPEN GAME (FIXED) ──────────────────────────────────────────────────────
function openGame(href, name){
  if(!href) return;
  // Build absolute URL for both external and local
  let absoluteUrl = href;
  // If it's a relative path (local game), prepend base directory
  if (!href.startsWith('http://') && !href.startsWith('https://') && !href.startsWith('//')) {
    let currentPath = window.location.pathname;
    let baseDir = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
    let fullPath = baseDir + href;
    if (!fullPath.startsWith('/')) fullPath = '/' + fullPath;
    absoluteUrl = window.location.origin + fullPath;
  }
  // Always send to parent to create a new internal window
  window.parent.postMessage({ type: 'localGame', url: absoluteUrl, title: name }, '*');
}

// ─── FILTER & RENDER ──────────────────────────────────────────────────────
function getFilteredGames() {
  if (!currentSearchQuery) return games;
  return games.filter(g => g.name.toLowerCase().includes(currentSearchQuery.toLowerCase()));
}

function renderGames(list) {
  var g = document.getElementById('game-grid');
  g.innerHTML = '';
  if (!list.length) {
    g.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.5);font-size:16px;">No games found.</div>';
    return;
  }
  list.forEach(function(gm) {
    var card = document.createElement('div');
    card.className = 'game-card';
    card.setAttribute('data-href', gm.href);

    var imgWrap = document.createElement('div');
    imgWrap.className = 'game-thumb';
    var img = document.createElement('img');
    img.src = gm.img;
    img.alt = gm.name;
    imgWrap.appendChild(img);

    var pin = document.createElement('div');
    pin.className = 'pin-icon';
    pin.innerHTML = '<i class="fas fa-thumbtack"></i>';

    card.appendChild(imgWrap);
    card.appendChild(pin);

    card.onclick = function(e) { if(e.button !== 2) openGame(gm.href, gm.name); };
    card.oncontextmenu = function(e){
      e.preventDefault();
      e.stopPropagation();
      currentGameForCtx = gm;
      var menu = document.getElementById('game-ctx');
      var favItem = document.getElementById('ctx-favorite');
      favItem.innerHTML = isFavorite(gm) ? '⭐ Remove from favorites' : '⭐ Add to favorites';
      menu.style.display = 'block';
      menu.style.left = Math.min(e.clientX, window.innerWidth - 210) + 'px';
      menu.style.top = Math.min(e.clientY, window.innerHeight - 150) + 'px';
      return false;
    };
    g.appendChild(card);
  });
}

function filterGames(q) { currentSearchQuery = q; renderGames(getFilteredGames()); }

// ─── CONTEXT MENU EVENTS ──────────────────────────────────────────────────
document.addEventListener('click', () => { document.getElementById('game-ctx').style.display = 'none'; });
document.getElementById('game-ctx').addEventListener('click', e => e.stopPropagation());
document.getElementById('ctx-favorite').addEventListener('click', () => { if(currentGameForCtx) toggleFavorite(currentGameForCtx); document.getElementById('game-ctx').style.display = 'none'; });

// ─── INIT ──────────────────────────────────────────────────────────────────
renderGames(games);

// Theme manager
if (window.themeManager) window.themeManager.initTheme();
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'themeChange' && e.data.theme && window.themeManager) {
    window.themeManager.applyTheme(e.data.theme);
  }
});
</script>
</body>
</html>
